<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ExpensIA</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <main class="shell">
      <header class="top">
        <div class="brand">ExpensIA</div>
        <button id="openSettings" class="icon-btn" aria-label="Abrir configuración">Ajustes</button>
      </header>

      <section class="card">
        <div class="label">Cuenta</div>
        <div class="status user-line" id="userLine"></div>
        <div class="row">
          <button id="signInBtn">Iniciar sesión</button>
          <button id="signOutBtn" disabled>Cerrar sesión</button>
        </div>
      </section>

      <section class="card sync-card">
        <div class="label">Sincronización</div>
        <button id="syncBtn" class="primary" disabled>Sincronizar gastos</button>

        <div class="sync-filter">
          <label class="range-toggle" for="useDateRange">
            <input id="useDateRange" type="checkbox" />
            <span class="range-title">Filtrar por rango de fechas</span>
          </label>
          <div id="dateRangeFields" class="date-range-fields hidden">
            <label class="date-field">
              <span>Desde</span>
              <input id="startDate" type="date" />
            </label>
            <label class="date-field">
              <span>Hasta</span>
              <input id="endDate" type="date" />
            </label>
          </div>
        </div>

        <div class="sync-state">
          <div class="sync-feedback">
            <span id="syncIndicator" class="sync-indicator" aria-hidden="true"></span>
            <div class="status" id="status"></div>
          </div>
          <div id="processLog" class="process-log"></div>
        </div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
